spring.application.name=placement-oracle-server
server.port=8080

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/placement_oracle}
app.upload.dir=uploads

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

jwt.secret=placement-oracle-super-secret-key-2026-secure-token
jwt.expiration-ms=86400000
